<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7a2e1f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Italy Tour" />
    <base href="./" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <title>Italy Tour Guide</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Escape hatch: hit `?nosw` once to nuke any stuck service-worker cache.
      if (new URL(location.href).searchParams.has("nosw") && "serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(rs => Promise.all(rs.map(r => r.unregister())))
          .then(() => caches.keys().then(ks => Promise.all(ks.map(k => caches.delete(k)))))
          .then(() => { location.href = location.pathname; });
      }
    </script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
