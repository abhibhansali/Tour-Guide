        ticketed: true
        chapters: [arrival, history, what_to_notice, stories]
        photo_query: "Pinacoteca di Brera"
        practical_tips: true
      - id: la_scala
        name: Teatro alla Scala
        type: short
        chapters: [short]
        photo_query: "Teatro alla Scala"
        practical_tips: false
      - id: navigli
        name: Navigli District
        type: short
        chapters: [short]
        photo_query: "Navigli Milan"
        practical_tips: false

