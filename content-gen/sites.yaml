# Edit this file freely, then re-run `npm run gen`.
# Generation is idempotent — already-generated chapters are skipped unless --force.
#
# Chapter types (defined in prompts/):
#   arrival        — orientation, what you're looking at, first impressions
#   history        — when/why/how it was built; the people behind it
#   architecture   — what to look for, key features, design language
#   stories        — anecdotes, legends, scandals, human moments
#   what_to_notice — easy-to-miss details once you're there
#   bigger_picture — how this fits the broader era / Italian history
#   short          — single 5-8 min combined chapter (for smaller sites)

cities:
  - id: milan
    name: Milan
    blurb: Italy's fashion and finance capital, with a Gothic masterpiece at its heart.
    chapters: [overview]
    photo_query: "Milan skyline"
    sites:
      - id: duomo
        name: Milan Cathedral (Duomo di Milano)
        type: major
        ticketed: true
        chapters: [arrival, history, architecture, stories, what_to_notice]
        photo_query: "Milan Cathedral facade"
        practical_tips: true
      - id: galleria
        name: Galleria Vittorio Emanuele II
        type: short
        chapters: [short]
        photo_query: "Galleria Vittorio Emanuele Milan"
        practical_tips: false
      - id: sforza
        name: Sforza Castle
        type: short
        chapters: [short]
        photo_query: "Castello Sforzesco"
        practical_tips: false
      - id: last_supper
        name: The Last Supper (Cenacolo)
