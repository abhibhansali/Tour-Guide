<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f9bd1"/>
      <stop offset="55%" stop-color="#86c2e6"/>
      <stop offset="100%" stop-color="#c8e3f2"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecaa5d"/>
      <stop offset="100%" stop-color="#c8773a"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ec4c4"/>
      <stop offset="100%" stop-color="#1c6d80"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52647a"/>
      <stop offset="100%" stop-color="#3a4a5e"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="370" cy="135" r="42" fill="#fff5dc" opacity="0.95"/>

  <!-- Distant atmospheric haze behind Alps -->
  <path d="M 0 235 Q 130 200 256 215 Q 380 230 512 210 L 512 280 L 0 280 Z" fill="#dde8f2" opacity="0.55"/>

  <!-- Alps (back range, lighter) -->
  <path d="M 0 240 L 50 175 L 95 215 L 140 145 L 195 200 L 250 130 L 305 195 L 360 155 L 415 205 L 465 170 L 512 215 L 512 290 L 0 290 Z" fill="#7d8ea0"/>

  <!-- Alps (front range, darker, with snow caps) -->
  <path d="M 0 285 L 70 200 L 120 245 L 175 165 L 235 235 L 295 180 L 350 240 L 410 195 L 465 245 L 512 220 L 512 320 L 0 320 Z" fill="url(#mountain)"/>

  <!-- Snow on the tall peaks -->
  <path d="M 175 165 L 158 200 L 192 200 Z" fill="#ffffff"/>
  <path d="M 295 180 L 280 215 L 310 215 Z" fill="#ffffff"/>
  <path d="M 70 200 L 58 225 L 82 225 Z" fill="#ffffff" opacity="0.92"/>

  <!-- Thar dunes -->
  <path d="M 0 315 Q 80 290 175 318 Q 270 345 370 312 Q 445 290 512 318 L 512 395 L 0 395 Z" fill="url(#sand)"/>

  <!-- Dune ridge highlights -->
  <path d="M 60 318 Q 120 298 175 318" stroke="#f5cf90" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 280 335 Q 330 318 380 320" stroke="#f5cf90" stroke-width="3" fill="none" opacity="0.7"/>

  <!-- Beach (sandy strip) -->
  <path d="M 0 395 Q 130 388 256 397 Q 380 405 512 392 L 512 425 L 0 425 Z" fill="#f3e5c5"/>

  <!-- Ocean -->
  <path d="M 0 425 Q 100 418 200 428 Q 320 438 420 422 Q 470 415 512 425 L 512 512 L 0 512 Z" fill="url(#water)"/>

  <!-- Wave highlights -->
  <path d="M 40 455 Q 90 450 145 458" stroke="#bce6e6" stroke-width="3" fill="none" opacity="0.8" stroke-linecap="round"/>
  <path d="M 300 472 Q 360 466 420 474" stroke="#bce6e6" stroke-width="3" fill="none" opacity="0.8" stroke-linecap="round"/>
  <path d="M 180 488 Q 220 484 260 489" stroke="#bce6e6" stroke-width="2.5" fill="none" opacity="0.6" stroke-linecap="round"/>

  <!-- Palm tree on the beach -->
  <g transform="translate(100, 395)">
    <!-- Trunk with subtle curve -->
    <path d="M 0 0 Q 4 -40 -2 -95 L 6 -95 Q 12 -40 8 0 Z" fill="#5e3a22"/>
    <!-- Trunk segments -->
    <path d="M -1 -25 Q 2 -27 7 -25" stroke="#3d2616" stroke-width="1" fill="none"/>
    <path d="M -2 -50 Q 1 -52 7 -50" stroke="#3d2616" stroke-width="1" fill="none"/>
    <path d="M -2 -75 Q 1 -77 6 -75" stroke="#3d2616" stroke-width="1" fill="none"/>
    <!-- Fronds: top -->
    <path d="M 2 -95 Q -18 -125 -28 -140 Q -8 -118 -2 -95 Z" fill="#2d5a2e"/>
    <path d="M 4 -95 Q 22 -125 32 -140 Q 12 -118 6 -95 Z" fill="#2d5a2e"/>
    <!-- Fronds: sides -->
    <path d="M 1 -94 Q -30 -110 -55 -100 Q -28 -94 -3 -90 Z" fill="#3a6f3a"/>
    <path d="M 5 -94 Q 35 -110 60 -100 Q 33 -94 8 -90 Z" fill="#3a6f3a"/>
    <!-- Fronds: lower-side -->
    <path d="M 1 -90 Q -22 -78 -42 -65 Q -22 -78 -2 -85 Z" fill="#4a8048"/>
    <path d="M 5 -90 Q 28 -78 47 -65 Q 28 -78 8 -85 Z" fill="#4a8048"/>
    <!-- Coconuts -->
    <circle cx="-1" cy="-89" r="4" fill="#3a2110"/>
    <circle cx="7" cy="-89" r="4" fill="#3a2110"/>
    <circle cx="3" cy="-85" r="4" fill="#3a2110"/>
  </g>
</svg>
